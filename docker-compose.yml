services:
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: ["start-dev", "--http-port=8080", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import:ro
      - keycloak_data:/opt/keycloak/data
    depends_on:
      - mailpit

  app:
    build: .
    # Let the app reach Keycloak at localhost:8080 from inside the container so
    # server-side token calls match the issuer in browser-issued tokens.
    extra_hosts:
      - "localhost:host-gateway"
    environment:
      # Keycloak is reachable by service name on the compose network.
      KEYCLOAK__URL: http://keycloak:8080
      # But the browser must use localhost to reach Keycloak from your machine.
      KEYCLOAK__PUBLIC_URL: http://localhost:8080
      KEYCLOAK__REALM: ${KEYCLOAK__REALM:-dev}
      KEYCLOAK__CLIENT_ID: ${KEYCLOAK__CLIENT_ID:-fastapi-server}
      KEYCLOAK__CLIENT_SECRET: ${KEYCLOAK__CLIENT_SECRET:-}
      KEYCLOAK__ADMIN_CLIENT_ID: ${KEYCLOAK__ADMIN_CLIENT_ID:-fastapi-admin}
      KEYCLOAK__ADMIN_CLIENT_SECRET: ${KEYCLOAK__ADMIN_CLIENT_SECRET:-dev-admin-secret-change-me}

      # Cookie should be secure only when you serve over HTTPS.
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:-dev-only-change-me}
    ports:
      - "8000:8000"
    depends_on:
      - keycloak

volumes:
  keycloak_data:
